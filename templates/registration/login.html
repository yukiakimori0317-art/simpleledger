<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | SimpleLedger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #f7f8fb 0%, #eef2f7 100%);
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            border-radius: 28px;
            padding: 28px;
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 20px 60px rgba(0,0,0,.12);
            border: 1px solid rgba(255,255,255,.55);
        }

        .sub-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #0d6efd;
            text-decoration: none;
            font-weight: 500;
        }

        .sub-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="card">
    <h1 class="h3 mb-4 text-center">SimpleLedger</h1>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">ユーザー名</label>
            <input
                type="text"
                name="username"
                class="form-control form-control-lg"
                autocomplete="username"
                required
            >
        </div>

        <div class="mb-3">
            <label class="form-label">パスワード</label>
            <input
                type="password"
                name="password"
                class="form-control form-control-lg"
                autocomplete="current-password"
                required
            >
        </div>

        <button type="submit" class="btn btn-dark btn-lg w-100">ログイン</button>

        {% if form.errors %}
        <div class="alert alert-danger mt-3 mb-0">
            ユーザー名またはパスワードが違います
        </div>
        {% endif %}
    </form>

    <a href="{% url 'kakeibo:signup' %}" class="sub-link">新規登録はこちら</a>
</div>
</body>
</html>
