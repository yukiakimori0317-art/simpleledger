<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー登録 | SimpleLedger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #f7f8fb 0%, #eef2f7 100%);
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            border-radius: 28px;
            padding: 28px;
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 20px 60px rgba(0,0,0,.12);
            border: 1px solid rgba(255,255,255,.55);
        }

        .card p {
            margin-bottom: 14px;
        }

        .card input {
            width: 100%;
            height: 48px;
            padding: 10px 14px;
            border: 1px solid #ced4da;
            border-radius: 12px;
            margin-top: 6px;
        }

        .helptext {
            display: block;
            font-size: 12px;
            color: #6c757d;
            margin-top: 6px;
        }

        .errorlist {
            color: #dc3545;
            padding-left: 18px;
            margin-bottom: 8px;
        }

        .sub-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #0d6efd;
            text-decoration: none;
            font-weight: 500;
        }

        .sub-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="card">
    <h1 class="h3 mb-4 text-center">ユーザー登録</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-dark btn-lg w-100 mt-2">登録する</button>
    </form>

    <a href="{% url 'kakeibo:login' %}" class="sub-link">ログインはこちら</a>
</div>
</body>
</html>
